<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工伤理赔试算平衡工具 — 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a365d;
            --accent: #2563eb;
            --text: #1e293b;
            --text-2: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "FZYaoTi", "方正姚体", "STFangsong", "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(155deg, #eef1f5 0%, #e4e9f2 40%, #dce3ed 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(203,213,225,0.5);
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 40px 36px;
            max-width: 400px; width: 100%;
            text-align: center;
        }
        .login-box h1 {
            font-size: 22px; font-weight: 700; color: var(--primary);
            margin-bottom: 6px; letter-spacing: -0.01em;
        }
        .login-box .subtitle {
            font-size: 13px; color: var(--text-2); margin-bottom: 24px;
        }
        .login-box input {
            width: 100%;
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(203,213,225,0.7);
            border-radius: 6px;
            padding: 12px 15px; font-size: 16px;
            color: var(--text); outline: none; font-family: inherit;
            text-align: center; letter-spacing: 4px;
            transition: all 0.2s ease;
        }
        .login-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .login-box button {
            width: 100%; margin-top: 16px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 6px;
            padding: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s ease;
        }
        .login-box button:hover { background: #1d4ed8; }
        .error-msg {
            color: #dc2626; font-size: 13px; margin-top: 12px;
            background: rgba(220,38,38,0.05);
            padding: 8px; border-radius: 6px;
        }
        .icon-wrap {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, rgba(26,54,93,0.08), rgba(37,99,235,0.1));
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; margin: 0 auto 16px;
            font-size: 24px; color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon-wrap"><i class="fa-solid fa-scale-balanced"></i></div>
        <h1>工伤理赔试算平衡工具</h1>
        <p class="subtitle">请输入密码以继续访问</p>
        <form method="POST">
            <input type="password" name="password" placeholder="输入密码" autofocus />
            <button type="submit"><i class="fa-solid fa-lock-open" style="margin-right:6px;"></i>登 录</button>
        </form>
        {% if error %}
        <div class="error-msg"><i class="fa-solid fa-triangle-exclamation" style="margin-right:4px;"></i>{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
